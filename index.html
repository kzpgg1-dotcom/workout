<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동일지">
<meta name="theme-color" content="#08080f">
<title>운동일지</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
 
body {
  background:#08080f; color:#e8e8f0;
  font-family:-apple-system,sans-serif;
  min-height:100vh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
 
/* ── TABS ── */
.tabbar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  display:flex; background:rgba(8,8,15,.95);
  border-top:1px solid rgba(255,255,255,.08);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab { flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; padding:10px 0;
  background:none; border:none; cursor:pointer; color:#555; font-size:10px;
  font-family:-apple-system,sans-serif; font-weight:600; letter-spacing:.04em;
}
.tab svg { width:22px; height:22px; }
.tab.active { color:#00e5ff; }
.tab:nth-child(2).active { color:#ff6b35; }
.tab:nth-child(3).active { color:#a855f7; }
 
/* ── SCREENS ── */
.screen { display:none; padding-bottom:80px; }
.screen.on { display:block; }
 
/* ── CALENDAR ── */
.cal-header {
  padding:calc(env(safe-area-inset-top) + 20px) 20px 12px;
  display:flex; justify-content:space-between; align-items:flex-start;
}
.cal-year { font-size:36px; font-weight:800; color:#fff; line-height:1; }
.cal-eyebrow { font-size:10px; color:#00e5ff; font-weight:700; letter-spacing:.2em; margin-bottom:4px; }
.cal-completed { text-align:right; }
.cal-completed .num { font-size:34px; font-weight:800; color:#00e5ff; line-height:1; }
.cal-completed .lbl { font-size:11px; color:#555; margin-bottom:4px; }
 
.legend { display:flex; gap:14px; padding:0 20px 14px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#555; }
.legend-dot { width:7px; height:7px; border-radius:50%; }
 
.month-nav { display:flex; align-items:center; justify-content:space-between; padding:0 20px 14px; }
.nav-btn { width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,.07);
  border:none; color:#fff; font-size:20px; cursor:pointer; display:flex;
  align-items:center; justify-content:center; }
.month-name { font-size:22px; font-weight:800; color:#fff; }
 
.day-row { display:grid; grid-template-columns:repeat(7,1fr); padding:0 12px; margin-bottom:4px; }
.day-lbl { text-align:center; font-size:11px; font-weight:700; padding:4px 0; color:#555; }
.day-lbl:first-child { color:#ff6b35; }
.day-lbl:last-child  { color:#6ab8ff; }
 
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:0 12px; gap:3px; }
.cal-cell {
  height:50px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  border-radius:10px; cursor:pointer;
  border:1px solid transparent;
  transition:opacity .1s;
}
.cal-cell:active { opacity:.6; }
.cal-cell.ghost { visibility:hidden; pointer-events:none; }
.cal-cell .n { font-size:15px; font-weight:600; color:rgba(220,220,235,.85); line-height:1; }
.cal-cell .n.sun { color:#ff6b35; }
.cal-cell .n.sat { color:#6ab8ff; }
.cal-cell .n.tod { color:#fff; font-weight:800; }
.cal-cell .t { font-size:8px; font-weight:700; line-height:1; }
.cal-cell .dot { width:4px; height:4px; border-radius:50%; }
.cal-cell.is-today { background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.2); }
 
/* Month summary */
.month-sum { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:18px 12px 0; }
.sum-card { border-radius:14px; padding:14px 8px; text-align:center;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); }
.sum-card .sn { font-size:24px; font-weight:800; line-height:1; color:rgba(255,255,255,.15); }
.sum-card .st { font-size:10px; font-weight:700; margin-top:4px; color:rgba(255,255,255,.15); }
 
/* ── DETAIL OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:#08080f; flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}
.overlay.on { display:flex; }
 
.ov-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top)+12px) 18px 12px;
  flex-shrink:0;
}
.back-btn { background:rgba(255,255,255,.07); border:none; color:#fff;
  padding:8px 14px; border-radius:12px; font-size:14px; cursor:pointer;
  font-family:-apple-system,sans-serif; }
.ov-actions { display:flex; gap:8px; align-items:center; }
.copy-btn { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  color:#aaa; padding:8px 12px; border-radius:12px; font-size:13px; cursor:pointer;
  display:flex; align-items:center; gap:5px; font-family:-apple-system,sans-serif; }
.done-btn { padding:8px 16px; border-radius:20px; font-size:13px; font-weight:700;
  cursor:pointer; border:1px solid transparent; font-family:-apple-system,sans-serif; }
 
.ov-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 16px 20px; }
.ov-date { font-size:11px; font-weight:700; letter-spacing:.12em; margin-bottom:6px; }
.ov-title { font-size:26px; font-weight:800; color:#fff; margin-bottom:4px; }
.ov-vol { font-size:12px; color:#555; margin-bottom:20px; }
 
/* Exercise card */
.ex-card { border-radius:14px; padding:14px; margin-bottom:10px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); }
.ex-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.ex-check { width:26px; height:26px; border-radius:8px; background:none;
  border:2px solid rgba(255,255,255,.2); cursor:pointer; display:flex;
  align-items:center; justify-content:center; font-size:13px; font-weight:800;
  flex-shrink:0; transition:all .15s; }
.ex-name { flex:1; font-size:15px; font-weight:700; }
.ex-menu { background:none; border:none; color:#555; font-size:20px;
  cursor:pointer; padding:0 6px; line-height:1; }
.sets-wrap { display:flex; flex-wrap:wrap; gap:6px; }
.set-chip { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.07);
  border-radius:8px; padding:5px 10px; font-size:12px; color:#bbb; }
.vol-chip { border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; }
 
.add-ex-btn { width:100%; padding:14px; border-radius:14px; background:none;
  font-size:14px; font-weight:700; cursor:pointer; margin-top:6px;
  font-family:-apple-system,sans-serif; border:1px dashed rgba(255,255,255,.15); color:#666; }
 
.empty-state { text-align:center; padding:50px 20px; color:#444; font-size:14px; }
.empty-state .ei { font-size:36px; display:block; margin-bottom:10px; }
 
/* Context menu */
.ctx { display:none; position:absolute; right:0; top:28px; z-index:10;
  background:#1c1c2e; border:1px solid rgba(255,255,255,.1); border-radius:12px;
  overflow:hidden; min-width:120px; box-shadow:0 8px 32px rgba(0,0,0,.6); }
.ctx.on { display:block; }
.ctx-item { padding:11px 16px; font-size:14px; cursor:pointer; }
.ctx-item:hover { background:rgba(255,255,255,.06); }
.ctx-item.red { color:#ff4444; }
 
/* ── TYPE MODAL ── */
.backdrop { display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,.75); align-items:flex-end; justify-content:center;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
.backdrop.on { display:flex; }
.sheet { background:#141421; border-radius:24px 24px 0 0; width:100%; max-width:480px;
  padding:0 20px calc(env(safe-area-inset-bottom)+24px);
  animation:slideUp .28s cubic-bezier(.32,1.4,.46,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width:40px; height:4px; background:rgba(255,255,255,.15);
  border-radius:2px; margin:14px auto 20px; }
.sheet-title { font-size:20px; font-weight:800; color:#fff; margin-bottom:4px; }
.sheet-sub { font-size:12px; color:#555; margin-bottom:22px; }
 
.type-row { display:flex; align-items:center; gap:14px; padding:14px 16px;
  border-radius:14px; border:1px solid transparent; cursor:pointer; margin-bottom:10px;
  background:none; width:100%; text-align:left; transition:opacity .1s; }
.type-row:active { opacity:.7; }
.type-icon { width:46px; height:46px; border-radius:13px; display:flex;
  align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.type-short { font-size:15px; font-weight:800; }
.type-full { font-size:12px; color:#555; margin-top:2px; }
.cancel-btn { width:100%; padding:12px; background:none; border:none; color:#555;
  font-size:14px; cursor:pointer; font-family:-apple-system,sans-serif; margin-top:4px; }
 
/* ── EX MODAL ── */
.ex-sheet { max-height:88vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.ex-sheet-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.ex-sheet-title { font-size:20px; font-weight:800; color:#fff; }
.confirm-btn { padding:8px 18px; border-radius:12px; border:none; font-size:14px;
  font-weight:700; cursor:pointer; font-family:-apple-system,sans-serif; }
.field-label { font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
  color:#555; display:block; margin-bottom:8px; }
.field-input { width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:11px 14px; color:#fff; font-size:15px;
  font-family:-apple-system,sans-serif; outline:none; margin-bottom:16px; }
.field-input:focus { border-color:rgba(0,229,255,.4); }
.tpl-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.tpl-chip { padding:7px 12px; border-radius:20px; font-size:12px; cursor:pointer;
  border:1px solid transparent; background:none; font-family:-apple-system,sans-serif;
  transition:all .15s; }
.set-input-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.set-num-lbl { font-size:11px; color:#555; width:34px; flex-shrink:0; font-weight:600; }
.set-input-row .field-input { flex:1; margin-bottom:0; font-size:14px; padding:9px 12px; }
.set-input-row .field-input.reps { width:72px; flex:0 0 72px; }
.del-set-btn { background:none; border:none; color:rgba(255,80,80,.6); font-size:20px;
  cursor:pointer; padding:0 2px; line-height:1; }
.add-set-btn { width:100%; padding:9px; border:1px dashed rgba(255,255,255,.12);
  border-radius:10px; background:none; color:#555; font-size:13px; cursor:pointer;
  margin-bottom:14px; font-family:-apple-system,sans-serif; }
 
/* ── STATS & ANALYSIS ── */
.page-hd { padding:calc(env(safe-area-inset-top)+20px) 20px 16px; }
.pg-eye { font-size:10px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px; }
.pg-title { font-size:32px; font-weight:800; color:#fff; }
.toggle-row { display:flex; background:rgba(255,255,255,.06); border-radius:14px;
  padding:4px; gap:2px; margin:0 16px 20px; }
.tog-btn { flex:1; border:none; border-radius:10px; padding:8px;
  font-size:13px; font-weight:700; background:none; color:#555;
  cursor:pointer; font-family:-apple-system,sans-serif; transition:all .2s; }
.tog-btn.active { color:#000; }
.stat2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px; margin-bottom:16px; }
.stat-card { border-radius:16px; padding:16px; border:1px solid transparent; }
.sc-lbl { font-size:11px; color:#555; margin-bottom:8px; }
.sc-val { font-size:28px; font-weight:800; line-height:1; }
.sc-unit { font-size:13px; color:#555; font-weight:400; }
.info-card { margin:0 16px 16px; border-radius:18px; padding:18px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); }
.info-card .ic-lbl { font-size:10px; color:#555; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; margin-bottom:12px; }
.streak-row { display:flex; align-items:center; gap:16px; }
.streak-emoji { font-size:36px; }
.streak-num { font-size:34px; font-weight:800; color:#ff6b35; line-height:1; }
.streak-sub { font-size:12px; color:#555; }
.streak-right { margin-left:auto; text-align:right; }
.streak-pct { font-size:26px; font-weight:800; color:#00e5ff; }
.bar-chart { display:flex; align-items:flex-end; gap:5px; height:110px; margin-top:8px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; height:100%; justify-content:flex-end; }
.bar-fill { width:100%; border-radius:5px 5px 0 0; min-height:3px; }
.bar-val { font-size:8px; color:#00e5ff; font-weight:700; }
.bar-lbl { font-size:9px; color:#555; }
.ratio-bar { height:10px; border-radius:5px; overflow:hidden; display:flex; gap:2px;
  background:rgba(255,255,255,.05); margin-bottom:12px; }
.ratio-seg { height:100%; border-radius:5px; }
.ratio-legend { display:flex; gap:14px; flex-wrap:wrap; }
.ratio-item { display:flex; align-items:center; gap:5px; font-size:12px; }
.ratio-dot { width:8px; height:8px; border-radius:50%; }
.recent-row { display:flex; align-items:center; padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.05); }
.recent-dot { width:8px; height:8px; border-radius:50%; margin-right:10px; flex-shrink:0; }
.recent-date { font-size:14px; flex:1; }
.recent-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:8px; margin-right:8px; }
.recent-vol { font-size:12px; color:#555; }
.pr-top { margin:0 16px 16px; border-radius:18px; padding:18px;
  background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.25); }
.pr-trophy { font-size:13px; font-weight:700; color:#ffd700; }
.pr-ex { font-size:17px; font-weight:800; color:#fff; margin:8px 0 6px; }
.pr-w { font-size:46px; font-weight:800; color:#a855f7; line-height:1; }
.pr-w span { font-size:20px; color:#555; font-weight:400; }
.pr-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.05); }
.pr-rank { font-size:14px; font-weight:800; width:26px; }
.pr-info { flex:1; }
.pr-name { font-size:14px; font-weight:700; }
.pr-date { font-size:11px; color:#555; }
.pr-weight { font-size:18px; font-weight:800; color:#a855f7; }
.pr-weight span { font-size:12px; color:#555; font-weight:400; }
.ex-picker { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
  -webkit-overflow-scrolling:touch; scrollbar-width:none; margin-bottom:14px; }
.ex-picker::-webkit-scrollbar { display:none; }
.ex-chip { flex-shrink:0; padding:8px 14px; border-radius:20px; font-size:13px;
  cursor:pointer; white-space:nowrap; font-family:-apple-system,sans-serif;
  border:1px solid rgba(168,85,247,.3); background:rgba(168,85,247,.08); color:#a855f7; }
.ex-chip.active { background:#a855f7; color:#fff; border-color:#a855f7; }
.mini-svg { width:100%; height:90px; }
.chart-hd { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.chart-cur { font-size:22px; font-weight:800; line-height:1; }
.chart-trend { font-size:12px; color:#00e5ff; margin-top:3px; }
.chart-dates { display:flex; justify-content:space-between; margin-top:4px; }
.chart-date { font-size:10px; color:#555; }
.total-grid { display:grid; grid-template-columns:1fr 1fr; margin:0 16px;
  border-radius:18px; overflow:hidden; background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07); }
.total-cell { padding:18px; text-align:center; }
.total-cell:first-child { border-right:1px solid rgba(255,255,255,.07); }
.total-num { font-size:28px; font-weight:800; line-height:1; }
.total-lbl { font-size:11px; color:#555; margin-top:4px; }
.empty-note { text-align:center; padding:50px 20px; color:#444; font-size:14px; }
.empty-note .ee { font-size:36px; display:block; margin-bottom:10px; }
 
/* Toast */
.toast { position:fixed; bottom:calc(72px + 16px); left:50%; transform:translateX(-50%);
  background:rgba(20,20,30,.95); color:#fff; padding:10px 20px; border-radius:20px;
  font-size:13px; z-index:999; opacity:0; transition:opacity .25s; pointer-events:none;
  border:1px solid rgba(255,255,255,.1); white-space:nowrap;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
.toast.show { opacity:1; }
</style>
</head>
<body>
 
<!-- CALENDAR -->
<div id="s-cal" class="screen on">
  <div class="cal-header">
    <div>
      <div class="cal-eyebrow">WORKOUT JOURNAL</div>
      <div class="cal-year" id="cal-year">2026</div>
    </div>
    <div class="cal-completed">
      <div class="lbl">이번 달 완료</div>
      <div><span class="num" id="cal-count">0</span>회</div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00e5ff"></div>M · Machine</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b35"></div>H · Home</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Hy · Hybrid</div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-name" id="cal-month">3월</div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="day-row">
    <div class="day-lbl">일</div><div class="day-lbl">월</div><div class="day-lbl">화</div>
    <div class="day-lbl">수</div><div class="day-lbl">목</div><div class="day-lbl">금</div>
    <div class="day-lbl" style="color:#6ab8ff">토</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="month-sum" id="month-sum"></div>
</div>
 
<!-- STATS -->
<div id="s-stat" class="screen">
  <div class="page-hd">
    <div class="pg-eye" style="color:#ff6b35">Statistics</div>
    <div class="pg-title">운동 통계</div>
  </div>
  <div class="toggle-row">
    <button class="tog-btn active" id="tog-m" onclick="setStatTab('m')" style="">월간</button>
    <button class="tog-btn" id="tog-w" onclick="setStatTab('w')">주간</button>
  </div>
  <div id="stat-body"></div>
</div>
 
<!-- ANALYSIS -->
<div id="s-an" class="screen">
  <div class="page-hd">
    <div class="pg-eye" style="color:#a855f7">Analysis</div>
    <div class="pg-title">운동 분석</div>
  </div>
  <div class="toggle-row">
    <button class="tog-btn active" id="tog-pr" onclick="setAnTab('pr')" style="">PR 기록</button>
    <button class="tog-btn" id="tog-vol" onclick="setAnTab('vol')">볼륨 추이</button>
  </div>
  <div id="an-body"></div>
</div>
 
<!-- TAB BAR -->
<nav class="tabbar">
  <button class="tab active" id="tab-cal" onclick="goTab('cal')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="3"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    달력
  </button>
  <button class="tab" id="tab-stat" onclick="goTab('stat')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    통계
  </button>
  <button class="tab" id="tab-an" onclick="goTab('an')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    분석
  </button>
</nav>
 
<!-- TYPE SELECT BACKDROP -->
<div class="backdrop" id="type-bd">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-sub" id="type-date-lbl"></div>
    <div class="sheet-title">운동 타입 선택</div>
    <div style="margin-top:16px">
      <button class="type-row" onclick="makeWorkout('M')" style="background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2)">
        <div class="type-icon" style="background:#00e5ff;color:#000">🏋️</div>
        <div><div class="type-short" style="color:#00e5ff">M</div><div class="type-full">Machine Day</div></div>
      </button>
      <button class="type-row" onclick="makeWorkout('H')" style="background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.2)">
        <div class="type-icon" style="background:#ff6b35;color:#000">🏠</div>
        <div><div class="type-short" style="color:#ff6b35">H</div><div class="type-full">Home Training</div></div>
      </button>
      <button class="type-row" onclick="makeWorkout('Hy')" style="background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.2)">
        <div class="type-icon" style="background:#a855f7">⚡️</div>
        <div><div class="type-short" style="color:#a855f7">Hy</div><div class="type-full">Hybrid</div></div>
      </button>
      <button class="cancel-btn" onclick="closeBd('type-bd')">취소</button>
    </div>
  </div>
</div>
 
<!-- EXERCISE MODAL -->
<div class="backdrop" id="ex-bd">
  <div class="sheet ex-sheet">
    <div class="sheet-handle"></div>
    <div class="ex-sheet-top">
      <div class="ex-sheet-title" id="ex-modal-title">운동 추가</div>
      <button class="confirm-btn" id="ex-confirm-btn" onclick="submitEx()">완료</button>
    </div>
    <label class="field-label">빠른 선택</label>
    <div class="tpl-wrap" id="tpl-wrap"></div>
    <label class="field-label">운동 이름</label>
    <input class="field-input" id="ex-name" placeholder="운동 이름 입력">
    <label class="field-label">세트 기록</label>
    <div id="sets-wrap"></div>
    <button class="add-set-btn" onclick="addSetRow()">+ 세트 추가</button>
  </div>
</div>
 
<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-ov">
  <div class="ov-nav">
    <button class="back-btn" onclick="closeDetail()">‹ 달력</button>
    <div class="ov-actions">
      <button class="copy-btn" onclick="copyWorkout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        복사
      </button>
      <button class="done-btn" id="done-btn" onclick="toggleDone()"></button>
    </div>
  </div>
  <div class="ov-scroll">
    <div class="ov-date" id="ov-date"></div>
    <div class="ov-title" id="ov-title"></div>
    <div class="ov-vol" id="ov-vol"></div>
    <div id="ex-list"></div>
    <button class="add-ex-btn" id="add-ex-btn" onclick="openExModal(null)">+ 운동 추가</button>
  </div>
</div>
 
<!-- TOAST -->
<div class="toast" id="toast"></div>
 
<script>
// ── DATA ──
const TC = { M:'#00e5ff', H:'#ff6b35', Hy:'#a855f7' };
const TR = { M:'0,229,255', H:'255,107,53', Hy:'168,85,247' };
const TL = { M:'Machine Day', H:'Home Training', Hy:'Hybrid' };
const TE = { M:'🏋️', H:'🏠', Hy:'⚡️' };
const TPLS = {
  M:['체스트 프레스','체스트 플라이 머신','인클라인 체스트 덤벨 프레스','랫풀다운',
     '케이블 시티드 로우 (V바)','케이블 시티드 로우 (오버핸드)','레그 프레스',
     '레그 컬','레그 익스텐션','숄더 프레스 머신','트라이셉 푸시다운'],
  H:['푸시업','풀업','딥스','스쿼트','런지','플랭크','버피','마운틴 클라이머'],
  Hy:['케틀벨 스윙','덤벨 로우','덤벨 숄더 프레스','고블릿 스쿼트',
      '케틀벨 스내치','파벌려가동성 (돌리기)','TRX 로우']
};
 
function load(){ try{ return JSON.parse(localStorage.getItem('wj3')||'{}'); }catch{ return {}; } }
function save(){ localStorage.setItem('wj3',JSON.stringify(db)); }
let db = load();
 
// ── STATE ──
let cy = new Date().getFullYear();
let cm = new Date().getMonth()+1;
let selDate = null;
let editExId = null;
let modalSets = [];
let statTab = 'm';
let anTab = 'pr';
let anEx = null;
let lpTimer = null;
 
// ── HELPERS ──
const fmt = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayStr = () => { const n=new Date(); return fmt(n.getFullYear(),n.getMonth()+1,n.getDate()); };
const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);
const wv = s => { const n=parseFloat((s||'').replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };
const exVol = ex => (ex.sets||[]).reduce((a,s)=>a+wv(s.w)*( parseInt(s.r)||0),0);
const wVol  = w  => (w.exercises||[]).reduce((a,e)=>a+exVol(e),0);
 
function monthWks(y,m){
  const p=`${y}-${String(m).padStart(2,'0')}`;
  return Object.values(db).filter(w=>w.date.startsWith(p));
}
function doneWks(y,m){ return monthWks(y,m).filter(w=>w.done); }
 
// ── CALENDAR ──
function renderCal(){
  document.getElementById('cal-year').textContent = cy;
  document.getElementById('cal-month').textContent = cm+'월';
  document.getElementById('cal-count').textContent = doneWks(cy,cm).length;
 
  const days = new Date(cy,cm,0).getDate();
  const first = new Date(cy,cm-1,1).getDay();
  const tStr = todayStr();
  const grid = document.getElementById('cal-grid');
 
  let h = '';
  for(let i=0;i<first;i++) h += '<div class="cal-cell ghost"></div>';
 
  for(let d=1;d<=days;d++){
    const ds = fmt(cy,cm,d);
    const w  = db[ds];
    const isT = ds===tStr;
    const dow = new Date(cy,cm-1,d).getDay();
    const nc  = dow===0?'sun':dow===6?'sat':isT?'tod':'';
 
    let bg='', bd='1px solid transparent';
    if(w){
      if(w.done){ bg=`rgba(${TR[w.type]},.13)`; bd=`1px solid rgba(${TR[w.type]},.4)`; }
      else       { bd=`1px dashed rgba(${TR[w.type]},.4)`; }
    } else if(isT){ bg='rgba(255,255,255,.07)'; bd='1px solid rgba(255,255,255,.2)'; }
 
    h += `<div class="cal-cell${isT?' is-today':''}" data-ds="${ds}"
      style="background:${bg};border:${bd}">
      <span class="n ${nc}">${d}</span>
      ${w?`<span class="t" style="color:${TC[w.type]}">${w.type}</span>`:''}
      ${w&&w.done?`<span class="dot" style="background:${TC[w.type]};box-shadow:0 0 5px ${TC[w.type]}"></span>`:''}
    </div>`;
  }
  grid.innerHTML = h;
 
  // events via delegation
  grid.onclick = e => {
    const c = e.target.closest('.cal-cell[data-ds]');
    if(c) tapDay(c.dataset.ds);
  };
  grid.addEventListener('contextmenu', e => {
    e.preventDefault();
    const c = e.target.closest('.cal-cell[data-ds]');
    if(c && db[c.dataset.ds]) copyByDate(c.dataset.ds);
  });
  grid.addEventListener('touchstart', e => {
    const c = e.target.closest('.cal-cell[data-ds]');
    if(c){ lpTimer = setTimeout(()=>{ if(db[c.dataset.ds]) copyByDate(c.dataset.ds); },600); }
  }, {passive:true});
  grid.addEventListener('touchend',  ()=>clearTimeout(lpTimer), {passive:true});
  grid.addEventListener('touchmove', ()=>clearTimeout(lpTimer), {passive:true});
 
  // summary
  const done = doneWks(cy,cm);
  const cnts = {M:0,H:0,Hy:0};
  done.forEach(w=>cnts[w.type]=(cnts[w.type]||0)+1);
  document.getElementById('month-sum').innerHTML =
    Object.entries(TC).map(([t,c])=>{
      const n=cnts[t]||0;
      const col = n>0?c:'rgba(255,255,255,.15)';
      return `<div class="sum-card" style="${n>0?`background:rgba(${TR[t]},.1);border-color:rgba(${TR[t]},.2)`:''}">
        <div class="sn" style="color:${col}">${n}</div>
        <div class="st" style="color:${col}">${t}</div>
      </div>`;
    }).join('');
}
 
function changeMonth(d){
  cm+=d;
  if(cm>12){cm=1;cy++;}
  if(cm<1){cm=12;cy--;}
  renderCal();
}
 
function tapDay(ds){
  selDate=ds;
  if(db[ds]) openDetail(ds);
  else { document.getElementById('type-date-lbl').textContent=ds; openBd('type-bd'); }
}
 
function makeWorkout(type){
  db[selDate]={id:uid(),date:selDate,type,exercises:[],done:false};
  save(); closeBd('type-bd'); renderCal(); openDetail(selDate);
}
 
// ── DETAIL ──
function openDetail(ds){
  selDate=ds;
  const w=db[ds]; if(!w) return;
  const c=TC[w.type], r=TR[w.type];
  document.getElementById('ov-date').textContent=ds;
  document.getElementById('ov-date').style.color=c;
  document.getElementById('ov-title').textContent=`${TE[w.type]} ${TL[w.type]}`;
  renderDoneBtn(w);
  renderExList();
  document.getElementById('add-ex-btn').style.cssText=`color:${c};border-color:rgba(${r},.3)`;
  document.getElementById('detail-ov').classList.add('on');
}
 
function closeDetail(){
  document.getElementById('detail-ov').classList.remove('on');
  renderCal();
}
 
function renderDoneBtn(w){
  const btn=document.getElementById('done-btn');
  const c=TC[w.type], r=TR[w.type];
  btn.textContent = w.done?'✓ 완료':'완료 체크';
  btn.style.cssText = w.done
    ? `background:${c};color:#000;border-color:${c}`
    : `background:rgba(${r},.1);color:${c};border-color:rgba(${r},.4)`;
}
 
function toggleDone(){
  if(!selDate||!db[selDate]) return;
  db[selDate].done=!db[selDate].done;
  save(); renderDoneBtn(db[selDate]);
  const v=wVol(db[selDate]);
  document.getElementById('ov-vol').textContent=v>0?`총 볼륨: ${v.toLocaleString()}kg`:'';
}
 
function renderExList(){
  const w=db[selDate]; if(!w) return;
  const c=TC[w.type], r=TR[w.type];
  const list=document.getElementById('ex-list');
  const v=wVol(w);
  document.getElementById('ov-vol').textContent=v>0?`총 볼륨: ${v.toLocaleString()}kg`:'';
 
  if(!w.exercises.length){
    list.innerHTML='<div class="empty-state"><span class="ei">💪</span>운동을 추가해보세요</div>';
    return;
  }
  list.innerHTML = w.exercises.map(ex=>{
    const vol=exVol(ex);
    const sets=ex.sets.map(s=>
      `<div class="set-chip">${s.w||'-'}${s.w&&s.r?' × ':''}${s.r?s.r+'회':''}</div>`
    ).join('');
    const volC=vol>0?`<div class="vol-chip" style="background:rgba(${r},.12);color:${c}">볼륨 ${vol.toLocaleString()}kg</div>`:'';
    return `<div class="ex-card${ex.ck?` done`:''}" id="exc-${ex.id}"
      style="${ex.ck?`background:rgba(${r},.08);border-color:rgba(${r},.25)`:''}">
      <div class="ex-top">
        <button class="ex-check" onclick="ckEx('${ex.id}')"
          style="${ex.ck?`background:${c};border-color:${c};color:#000`:''}">
          ${ex.ck?'✓':''}
        </button>
        <div class="ex-name" style="${ex.ck?`color:${c};text-decoration:line-through`:''}">
          ${ex.name}
        </div>
        <div style="position:relative">
          <button class="ex-menu" onclick="toggleCtx('ctx-${ex.id}',event)">···</button>
          <div class="ctx" id="ctx-${ex.id}">
            <div class="ctx-item" onclick="editEx('${ex.id}')">✏️ 수정</div>
            <div class="ctx-item red" onclick="delEx('${ex.id}')">🗑 삭제</div>
          </div>
        </div>
      </div>
      <div class="sets-wrap">${sets}${volC}</div>
    </div>`;
  }).join('');
}
 
function ckEx(id){
  const w=db[selDate]; if(!w) return;
  const ex=w.exercises.find(e=>e.id===id); if(!ex) return;
  ex.ck=!ex.ck; save(); renderExList();
}
function delEx(id){
  db[selDate].exercises=db[selDate].exercises.filter(e=>e.id!==id);
  save(); renderExList(); closeAllCtx();
}
function editEx(id){ closeAllCtx(); openExModal(id); }
function toggleCtx(id,e){
  e.stopPropagation(); closeAllCtx();
  document.getElementById(id)?.classList.toggle('on');
}
function closeAllCtx(){ document.querySelectorAll('.ctx.on').forEach(c=>c.classList.remove('on')); }
document.addEventListener('click', closeAllCtx);
 
// ── EX MODAL ──
function openExModal(exId){
  editExId=exId;
  const w=db[selDate]; if(!w) return;
  const ex=exId?w.exercises.find(e=>e.id===exId):null;
  const c=TC[w.type], r=TR[w.type];
 
  document.getElementById('ex-modal-title').textContent=exId?'운동 수정':'운동 추가';
  const cb=document.getElementById('ex-confirm-btn');
  cb.style.cssText=`background:${c};color:#000`;
  document.getElementById('ex-name').value=ex?.name||'';
 
  // templates
  document.getElementById('tpl-wrap').innerHTML=(TPLS[w.type]||[]).map(t=>
    `<button class="tpl-chip" onclick="pickTpl('${t.replace(/'/g,"\\'")}','${r}','${c}')"
      style="background:rgba(${r},.08);border-color:rgba(${r},.25);color:${c}">${t}</button>`
  ).join('');
 
  modalSets=ex?ex.sets.map(s=>({w:s.w,r:String(s.r)})):[{w:'',r:''}];
  renderSetRows(r,c);
  openBd('ex-bd');
  closeAllCtx();
}
 
function pickTpl(name,r,c){
  document.getElementById('ex-name').value=name;
  document.querySelectorAll('.tpl-chip').forEach(ch=>{
    if(ch.textContent===name){ ch.style.background=`#${c.replace('#','')}`; ch.style.color='#000'; }
  });
}
 
function renderSetRows(r,c){
  const w=db[selDate];
  const cr=r||TR[w?.type||'M'], cc=c||TC[w?.type||'M'];
  document.getElementById('sets-wrap').innerHTML=modalSets.map((s,i)=>`
    <div class="set-input-row">
      <span class="set-num-lbl">Set ${i+1}</span>
      <input class="field-input" placeholder="무게 (예: 80kg)" value="${s.w||''}"
        oninput="modalSets[${i}].w=this.value">
      <input class="field-input reps" placeholder="횟수" value="${s.r||''}" type="number"
        oninput="modalSets[${i}].r=this.value">
      ${modalSets.length>1?`<button class="del-set-btn" onclick="delSetRow(${i})">×</button>`:''}
    </div>`).join('');
}
 
function addSetRow(){ modalSets.push({w:'',r:''}); renderSetRows(); }
function delSetRow(i){ modalSets.splice(i,1); renderSetRows(); }
 
function submitEx(){
  const name=document.getElementById('ex-name').value.trim(); if(!name) return;
  const sets=modalSets.filter(s=>s.w||s.r).map(s=>({w:s.w||'',r:parseInt(s.r)||0}));
  const w=db[selDate];
  if(editExId){
    const ex=w.exercises.find(e=>e.id===editExId);
    if(ex){ ex.name=name; ex.sets=sets.length?sets:[{w:'',r:0}]; }
  } else {
    w.exercises.push({id:uid(),name,sets:sets.length?sets:[{w:'',r:0}],ck:false});
  }
  save(); closeBd('ex-bd'); renderExList();
}
 
// ── COPY ──
function buildText(ds){
  const w=db[ds]; if(!w) return '';
  let lines=[`${ds} ${w.type}`, '----운동기록----'];
  if(!w.exercises.length){ lines.push('(운동 기록 없음)'); }
  else {
    w.exercises.forEach(ex=>{
      lines.push(ex.name);
      const sStr=ex.sets.filter(s=>s.w||s.r)
        .map(s=>{ const wt=s.w||''; const r=s.r?`${s.r}`:''; return wt&&r?`${wt}×${r}`:wt||`×${r}`; })
        .join(' / ');
      if(sStr) lines.push('  '+sStr);
    });
    const v=wVol(w);
    if(v>0){ lines.push('--------------'); lines.push(`총 볼륨: ${v.toLocaleString()}kg`); }
  }
  return lines.join('\n');
}
 
function copyByDate(ds){
  const t=buildText(ds); if(!t){showToast('기록된 운동이 없어요');return;}
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(t).then(()=>showToast('📋 복사됐어요!')).catch(()=>fbCopy(t));
  } else fbCopy(t);
}
function copyWorkout(){ copyByDate(selDate); }
function fbCopy(t){
  const ta=document.createElement('textarea');
  ta.value=t; ta.style.cssText='position:fixed;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); showToast('📋 복사됐어요!'); }
  catch{ showToast('복사 실패'); }
  document.body.removeChild(ta);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
 
// ── TABS ──
function goTab(t){
  ['cal','stat','an'].forEach(k=>{
    document.getElementById('s-'+k).classList.toggle('on',k===t);
    document.getElementById('tab-'+k).classList.toggle('active',k===t);
  });
  if(t==='stat') renderStats();
  if(t==='an')   renderAn();
}
 
// ── STATS ──
function setStatTab(t){
  statTab=t;
  document.getElementById('tog-m').classList.toggle('active',t==='m');
  document.getElementById('tog-w').classList.toggle('active',t==='w');
  document.getElementById('tog-m').style.background=t==='m'?'#ff6b35':'';
  document.getElementById('tog-w').style.background=t==='w'?'#ff6b35':'';
  renderStats();
}
 
function renderStats(){
  document.getElementById('tog-m').style.background = statTab==='m'?'#ff6b35':'';
  document.getElementById('tog-w').style.background = statTab==='w'?'#ff6b35':'';
  const now=new Date(), y=now.getFullYear(), m=now.getMonth()+1;
  const body=document.getElementById('stat-body');
 
  if(statTab==='m'){
    const wks=doneWks(y,m);
    const tv=wks.reduce((a,w)=>a+wVol(w),0);
    const streak=calcStreak();
    const dg=Math.min(now.getDate(),new Date(y,m,0).getDate());
    const rate=dg>0?Math.round(wks.length/dg*100):0;
    const cnts={M:0,H:0,Hy:0}; wks.forEach(w=>cnts[w.type]++);
    const tot=wks.length||1;
    const weekly=weeklyVols();
    const maxV=Math.max(...weekly.map(w=>w.v),1);
    const recent=[...wks].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
 
    body.innerHTML=`
    <div class="stat2">
      <div class="stat-card" style="background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2)">
        <div class="sc-lbl">완료 횟수</div>
        <div class="sc-val" style="color:#00e5ff">${wks.length}<span class="sc-unit">회</span></div>
      </div>
      <div class="stat-card" style="background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.2)">
        <div class="sc-lbl">총 볼륨</div>
        <div class="sc-val" style="color:#a855f7">${tv>=1000?(tv/1000).toFixed(1)+'k':tv}<span class="sc-unit">kg</span></div>
      </div>
    </div>
    <div class="info-card">
      <div class="streak-row">
        <div class="streak-emoji">🔥</div>
        <div>
          <div style="font-size:11px;color:#555;margin-bottom:2px">연속 운동</div>
          <div class="streak-num">${streak}<span style="font-size:16px;color:#555;font-weight:400"> 일</span></div>
        </div>
        <div class="streak-right">
          <div style="font-size:10px;color:#555;margin-bottom:4px">이번 달 출석률</div>
          <div class="streak-pct">${rate}%</div>
        </div>
      </div>
    </div>
    <div class="info-card">
      <div class="ic-lbl">타입별 비율</div>
      <div class="ratio-bar">
        ${Object.entries(TC).map(([t,c])=>{ const p=cnts[t]/tot*100; return p>0?`<div class="ratio-seg" style="width:${p}%;background:${c}"></div>`:''; }).join('')}
      </div>
      <div class="ratio-legend">
        ${Object.entries(TC).map(([t,c])=>`<div class="ratio-item"><div class="ratio-dot" style="background:${c}"></div><span style="color:#555">${t}</span><span style="color:${c};font-weight:700;margin-left:2px">${cnts[t]}회</span></div>`).join('')}
      </div>
    </div>
    <div class="info-card">
      <div class="ic-lbl">주간 볼륨 추이</div>
      <div class="bar-chart">
        ${weekly.map((w,i)=>{
          const h=maxV>0?Math.max(w.v/maxV*90,w.v>0?4:2):2;
          const last=i===weekly.length-1;
          return `<div class="bar-col">
            ${w.v>0?`<div class="bar-val">${w.v>=1000?(w.v/1000).toFixed(1)+'k':w.v}</div>`:''}
            <div class="bar-fill" style="height:${h}px;background:${last?'#00e5ff':'rgba(0,229,255,.25)'}"></div>
            <div class="bar-lbl">${w.l}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="info-card">
      <div class="ic-lbl">이번 달 기록</div>
      ${recent.length?recent.map(w=>{
        const v=wVol(w);
        return `<div class="recent-row">
          <div class="recent-dot" style="background:${TC[w.type]}"></div>
          <div class="recent-date">${w.date}</div>
          <div class="recent-badge" style="background:rgba(${TR[w.type]},.15);color:${TC[w.type]}">${w.type}</div>
          ${v>0?`<div class="recent-vol">${v.toLocaleString()}kg</div>`:''}
        </div>`;
      }).join(''):'<div style="color:#444;padding:16px 0;text-align:center">완료된 운동이 없어요</div>'}
    </div>`;
  } else {
    // weekly
    const mon=new Date(); mon.setDate(mon.getDate()-mon.getDay()+1);
    let wks2=[];
    for(let i=0;i<7;i++){
      const d=new Date(mon); d.setDate(mon.getDate()+i);
      const ds=fmt(d.getFullYear(),d.getMonth()+1,d.getDate());
      if(db[ds]&&db[ds].done) wks2.push(db[ds]);
    }
    const tv=wks2.reduce((a,w)=>a+wVol(w),0);
    const cnts={M:0,H:0,Hy:0}; wks2.forEach(w=>cnts[w.type]++);
    const tot=wks2.length||1;
    body.innerHTML=`
    <div class="stat2">
      <div class="stat-card" style="background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2)">
        <div class="sc-lbl">이번 주 완료</div>
        <div class="sc-val" style="color:#00e5ff">${wks2.length}<span class="sc-unit">회</span></div>
      </div>
      <div class="stat-card" style="background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.2)">
        <div class="sc-lbl">이번 주 볼륨</div>
        <div class="sc-val" style="color:#ff6b35">${tv>=1000?(tv/1000).toFixed(1)+'k':tv}<span class="sc-unit">kg</span></div>
      </div>
    </div>
    <div class="info-card">
      <div class="ic-lbl">타입별 비율</div>
      <div class="ratio-bar">
        ${Object.entries(TC).map(([t,c])=>{ const p=cnts[t]/tot*100; return p>0?`<div class="ratio-seg" style="width:${p}%;background:${c}"></div>`:''; }).join('')}
      </div>
      <div class="ratio-legend">
        ${Object.entries(TC).map(([t,c])=>`<div class="ratio-item"><div class="ratio-dot" style="background:${c}"></div><span style="color:#555">${t}</span><span style="color:${c};font-weight:700;margin-left:2px">${cnts[t]}회</span></div>`).join('')}
      </div>
    </div>`;
  }
}
 
// ── ANALYSIS ──
function setAnTab(t){
  anTab=t; anEx=null;
  document.getElementById('tog-pr').classList.toggle('active',t==='pr');
  document.getElementById('tog-vol').classList.toggle('active',t==='vol');
  document.getElementById('tog-pr').style.background=t==='pr'?'#a855f7':'';
  document.getElementById('tog-vol').style.background=t==='vol'?'#a855f7':'';
  renderAn();
}
 
function renderAn(){
  document.getElementById('tog-pr').style.background = anTab==='pr'?'#a855f7':'';
  document.getElementById('tog-vol').style.background = anTab==='vol'?'#a855f7':'';
  const body=document.getElementById('an-body');
  if(anTab==='pr') renderPR(body);
  else renderVol(body);
}
 
function getPRs(){
  const prs={};
  Object.values(db).forEach(w=>(w.exercises||[]).forEach(ex=>{
    const mx=Math.max(0,...(ex.sets||[]).map(s=>wv(s.w)));
    if(mx>0&&(!prs[ex.name]||mx>prs[ex.name].w)) prs[ex.name]={name:ex.name,w:mx,date:w.date};
  }));
  return Object.values(prs).sort((a,b)=>b.w-a.w);
}
function allExNames(){ const s=new Set(); Object.values(db).forEach(w=>(w.exercises||[]).forEach(e=>s.add(e.name))); return [...s].sort(); }
function wHist(name){ return Object.values(db).filter(w=>w.exercises.some(e=>e.name===name)).sort((a,b)=>a.date.localeCompare(b.date)).map(w=>({date:w.date,v:Math.max(0,...w.exercises.find(e=>e.name===name).sets.map(s=>wv(s.w)))})).filter(x=>x.v>0); }
function vHist(name){ return Object.values(db).filter(w=>w.exercises.some(e=>e.name===name)).sort((a,b)=>a.date.localeCompare(b.date)).map(w=>({date:w.date,v:exVol(w.exercises.find(e=>e.name===name))})).filter(x=>x.v>0); }
 
function renderPR(body){
  const prs=getPRs(), names=allExNames();
  if(!prs.length){ body.innerHTML='<div class="empty-note"><span class="ee">🏆</span>무게를 기록하면 PR이 자동으로 추적됩니다</div>'; return; }
  const top=prs[0];
  const hist=anEx?wHist(anEx):[];
  body.innerHTML=`
  <div class="pr-top">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="pr-trophy">🏆 최고 기록</span><span style="font-size:11px;color:#555">${top.date}</span>
    </div>
    <div class="pr-ex">${top.name}</div>
    <div class="pr-w">${top.w}<span>kg</span></div>
  </div>
  <div class="info-card">
    <div class="ic-lbl">전체 PR 순위</div>
    ${prs.map((p,i)=>{
      const rc=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#555';
      return `<div class="pr-row">
        <div class="pr-rank" style="color:${rc}">${i+1}</div>
        <div class="pr-info"><div class="pr-name">${p.name}</div><div class="pr-date">${p.date}</div></div>
        <div class="pr-weight">${p.w}<span>kg</span></div>
      </div>`;
    }).join('')}
  </div>
  ${names.length?`
  <div class="info-card">
    <div class="ic-lbl">무게 증가 추이</div>
    <div class="ex-picker">
      ${names.map(n=>`<div class="ex-chip${anEx===n?' active':''}" onclick="pickAnEx('${n.replace(/'/g,"\\'")}','pr')">${n}</div>`).join('')}
    </div>
    ${anEx&&hist.length>=2?miniChart(hist,'#a855f7'):anEx?'<div style="color:#444;font-size:13px">데이터가 더 쌓이면 볼 수 있어요</div>':'<div style="color:#444;font-size:13px">운동을 선택해주세요</div>'}
  </div>`:''}
  <div class="total-grid">
    ${totalCells()}
  </div>`;
}
 
function renderVol(body){
  const names=allExNames();
  const hist=anEx?vHist(anEx):[];
  body.innerHTML=`
  <div class="info-card">
    <div class="ic-lbl">운동 선택</div>
    <div class="ex-picker">
      ${names.length?names.map(n=>`<div class="ex-chip${anEx===n?' active':''}" onclick="pickAnEx('${n.replace(/'/g,"\\'")}','vol')">${n}</div>`).join(''):'<span style="color:#444;font-size:13px">기록된 운동이 없습니다</span>'}
    </div>
    ${anEx&&hist.length>=2?'<div style="margin-top:14px">'+miniChart(hist,'#ff6b35')+'</div>':anEx?'<div style="color:#444;font-size:13px;margin-top:10px">데이터가 더 쌓이면 볼 수 있어요</div>':names.length?'<div style="color:#444;font-size:13px;margin-top:10px">운동을 선택해주세요</div>':''}
  </div>
  <div class="total-grid">
    ${totalCells()}
  </div>`;
}
 
function pickAnEx(name,tab){ anEx=anEx===name?null:name; if(tab==='pr') renderPR(document.getElementById('an-body')); else renderVol(document.getElementById('an-body')); }
 
function miniChart(hist,color){
  const vals=hist.map(h=>h.v);
  const mx=Math.max(...vals,1), mn=Math.min(...vals);
  const rng=Math.max(mx-mn,1);
  const last=vals[vals.length-1], first=vals[0], diff=last-first;
  const W=300,H=80,p=8;
  const pts=hist.map((h,i)=>[p+(W-p*2)*i/Math.max(hist.length-1,1), H-p-(H-p*2)*(h.v-mn)/rng]);
  const path=pts.map((pt,i)=>(i===0?`M${pt[0]},${pt[1]}`:`L${pt[0]},${pt[1]}`)).join(' ');
  const dots=pts.map(pt=>`<circle cx="${pt[0]}" cy="${pt[1]}" r="3.5" fill="${color}"/>`).join('');
  return `<div>
    <div class="chart-hd">
      <div><div class="chart-cur" style="color:${color}">${last.toLocaleString()}<span style="font-size:13px;color:#555;font-weight:400">kg</span></div>
      <div class="chart-trend">${diff>0?'📈 +'+Math.abs(diff).toFixed(1)+'kg 증가':'📊 '+diff.toFixed(1)+'kg 변화'}</div></div>
    </div>
    <svg class="mini-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
    </svg>
    <div class="chart-dates"><span class="chart-date">${hist[0].date.slice(5)}</span><span class="chart-date">${hist[hist.length-1].date.slice(5)}</span></div>
  </div>`;
}
 
function totalCells(){
  const all=Object.values(db);
  const tv=all.reduce((a,w)=>a+wVol(w),0);
  const tc=all.filter(w=>w.done).length;
  return `<div class="total-cell"><div class="total-num" style="color:#ff6b35">${(tv/1000).toFixed(1)}<span style="font-size:14px;color:#555;font-weight:400">ton</span></div><div class="total-lbl">전체 누적 볼륨</div></div>
  <div class="total-cell"><div class="total-num" style="color:#a855f7">${tc}<span style="font-size:14px;color:#555;font-weight:400">회</span></div><div class="total-lbl">전체 운동 횟수</div></div>`;
}
 
// ── HELPERS ──
function calcStreak(){
  let s=0, d=new Date();
  while(true){
    const ds=fmt(d.getFullYear(),d.getMonth()+1,d.getDate());
    if(db[ds]&&db[ds].done){ s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}
function weeklyVols(){
  const res=[];
  for(let i=-7;i<=0;i++){
    const d=new Date(); d.setDate(d.getDate()+i*7);
    const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
    let v=0;
    for(let j=0;j<7;j++){
      const dd=new Date(mon); dd.setDate(mon.getDate()+j);
      const ds=fmt(dd.getFullYear(),dd.getMonth()+1,dd.getDate());
      if(db[ds]) v+=wVol(db[ds]);
    }
    res.push({l:`${mon.getMonth()+1}/${mon.getDate()}`,v});
  }
  return res;
}
 
function openBd(id){ document.getElementById(id).classList.add('on'); }
function closeBd(id){ document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.backdrop').forEach(b=>{
  b.addEventListener('click',e=>{ if(e.target===b) b.classList.remove('on'); });
});
 
// ── INIT ──
renderCal();
</script>
